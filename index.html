<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IndustrialQuest - Juego educativo para aprender inglés jugando">
    <meta name="theme-color" content="#1b1342">
    <title>IndustrialQuest 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #1b1342;
            font-family: 'Calibri', Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            display: block;
            border: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #1b1342 0%, #2d1f5c 100%);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #fff;
            font-size: 18px;
            text-align: center;
        }

        .error-container {
            background: #8b0000;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            text-align: center;
            margin: 20px;
        }

        .error-container h2 {
            margin-bottom: 10px;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
        }

        /* Responsive para móviles */
        @media (max-width: 768px) {
            .loading-spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(255, 255, 255, 0.3);
                border-top: 3px solid #fff;
            }

            .loading-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-container">
        <div class="loading-spinner"></div>
        <div class="loading-text">
            Cargando IndustrialQuest...
        </div>
    </div>

    <div id="game-container" style="display: none;"></div>
    <div id="error-container" style="display: none;"></div>

    <script>
        // Configuración para emscripten y pygbag
        var Module = {
            canvas: (() => {
                const canvas = document.createElement('canvas');
                canvas.id = 'game-canvas';
                return canvas;
            })(),
            onRuntimeInitialized: () => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                document.getElementById('game-container').appendChild(Module.canvas);
            },
            print: (text) => console.log('stdout:', text),
            printErr: (text) => console.error('stderr:', text),
            setStatus: (text) => {
                if (text) {
                    console.log('Status:', text);
                }
            }
        };

        // Crear elemento para el juego
        const gameContainer = document.getElementById('game-container');
        
        // Agregar canvas al contenedor
        window.addEventListener('load', () => {
            // Manejar errores de carga
            window.addEventListener('error', (e) => {
                console.error('Error:', e.error);
                const errorContainer = document.getElementById('error-container');
                errorContainer.style.display = 'flex';
                errorContainer.innerHTML = `
                    <div class="error-container">
                        <h2>Error al cargar el juego</h2>
                        <p>${e.error.message || 'Error desconocido'}</p>
                        <p style="margin-top: 10px; font-size: 12px;">
                            Por favor, recarga la página o intenta con otro navegador.
                        </p>
                    </div>
                `;
                document.getElementById('loading').style.display = 'none';
            });
        });

        // Configurar localStorage para persistencia de datos
        if (!window.localStorage) {
            console.warn('localStorage no disponible. Los datos no se persistirán.');
        }

        // Mensaje de bienvenida en consola
        console.log('%cIndustrialQuest v1.0', 'font-size: 24px; color: #00ff00; font-weight: bold;');
        console.log('%cJuego educativo para aprender inglés', 'color: #00ffff;');
    </script>

    <!-- Script de pygbag (se genera durante el build) -->
    <script src="pygame-runner.js" type="text/javascript"></script>
</body>
</html>
